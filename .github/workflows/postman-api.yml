name: Run SmartOLT Postman Collection

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Jalankan setiap hari pukul 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Bisa dijalankan manual dari GitHub

jobs:
  run-postman-collection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Newman
        run: npm install -g newman newman-reporter-html

      - name: Create results directory
        run: mkdir -p results

      - name: Run SmartOLT Collection with Newman
        run: |
          newman run "smartolt-postman-collection.json" \
            -e "smartolt-postman-environment.json" \
            --env-var "subdomain=${{ secrets.SMARTOLT_SUBDOMAIN }}" \
            --env-var "api_key=${{ secrets.SMARTOLT_API_KEY }}" \
            --reporters cli,html \
            --reporter-html-export results/report.html \
            --timeout-request 30000 \
            --delay-request 1000
        continue-on-error: true

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: results/report.html
          retention-days: 30

      - name: Upload Newman Summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-summary
          path: results/
          retention-days: 30
